name: mlops-training

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - scikit-learn
  - matplotlib

  - pip:
      - tensorflow==2.19.0
      - jupyter==1.1.1
      - tensorboard
      - mlflow==3.1.0
      - pydantic==2.11.7
      - pydantic-settings
      - python-dotenv==1.1.0
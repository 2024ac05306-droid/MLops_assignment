name: MLOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-test-train:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create run folders
        run: mkdir -p logs outputs/test-results outputs/reports outputs/mlflow models data/processed

      - name: Lint source and tests
        run: |
          ruff check src tests | tee logs/lint.log

      - name: Run unit tests
        run: |
          pytest --junitxml=outputs/test-results/pytest.xml | tee logs/unit-tests.log

      - name: Run data preprocessing
        run: |
          python src/preprocess_data.py 2>&1 | tee logs/preprocess.log

      - name: Train model
        run: |
          python src/model_train.py 2>&1 | tee logs/training.log

      - name: Build Docker image
        run: |
          docker build -t mlops-model-api:latest . 2>&1 | tee logs/docker-build.log

      - name: Run Docker container
        run: |
          docker run -d --name mlops-model-api -p 8000:8000 mlops-model-api:latest
          sleep 15
          docker logs mlops-model-api > logs/docker-container.log

      - name: Test API health endpoint
        run: |
          curl --fail http://localhost:8000/health | tee logs/api-health.log

      - name: Test API predict endpoint
        run: |
          curl --fail -X POST "http://localhost:8000/predict" \
            -H "Content-Type: application/json" \
            --data @samples/predict_sample.json | tee logs/api-predict.log

      - name: Stop Docker container
        if: always()
        run: |
          docker logs mlops-model-api >> logs/docker-container.log 2>&1 || true
          docker stop mlops-model-api || true
          docker rm mlops-model-api || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlops-run-${{ github.run_number }}
          path: |
            logs/
            outputs/test-results/
            outputs/reports/
            outputs/mlflow/
            models/
            data/processed/
          if-no-files-found: warn
          retention-days: 14

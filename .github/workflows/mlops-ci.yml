name: MLOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint-test-train:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create run folders
        run: mkdir -p logs outputs/test-results outputs/reports outputs/mlflow models data/processed

      - name: Lint source and tests
        run: |
          ruff check src tests | tee logs/lint.log

      - name: Run unit tests
        run: |
          pytest --junitxml=outputs/test-results/pytest.xml | tee logs/unit-tests.log

      - name: Run data preprocessing
        run: |
          python src/preprocess_data.py 2>&1 | tee logs/preprocess.log

      - name: Train model
        run: |
          python src/model_train.py 2>&1 | tee logs/training.log

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlops-run-${{ github.run_number }}
          path: |
            logs/
            outputs/test-results/
            outputs/reports/
            outputs/mlflow/
            models/
            data/processed/
          if-no-files-found: warn
          retention-days: 14
